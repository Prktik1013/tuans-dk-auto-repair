<!DOCTYPE html>
<!-- rf-kit module: dashboard / owner-dashboard  (standalone page, NOT a site section)
     The control room: every lead from the website, its status, one tap to mark it booked or done.
     Brand-matched premium software - the trust wrapper that shows the system working every morning.
     Data lives in the CLIENT'S Google Sheet; this page reads/writes via THEIR Apps Script /exec
     endpoint (see SETUP.md). Reads are gated by DASHBOARD_KEY (the Brain's DASH_KEY) so the public
     /exec URL cannot dump leads; a passphrase gate ({{DASHBOARD_PASS}}) keeps casual eyes out.
     Host it at /owner/ or hand it as a local file - either way it is theirs.
     Placeholders: Tuan's DK Auto Repair {{CLIENT_SHEET_ENDPOINT}} #c4512a #0d0d0d {{DASHBOARD_PASS}} {{DASHBOARD_KEY}} -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Tuan's DK Auto Repair - lead control room</title>
<style>
  :root {
    --b: #c4512a; --ink: #0d0d0d;
    --bg: #f6f5f1; --paper: #ffffff; --line: #e7e4dc; --muted: #6c706b; --soft: #9aa09a;
    --new: var(--b); --booked: #2f6bd6; --done: #1c7c54;
    --shadow: 0 1px 2px rgba(20,20,20,.05), 0 20px 44px -30px rgba(20,20,20,.35);
    --r: 16px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background:
      radial-gradient(1200px 520px at 78% -12%, color-mix(in srgb, var(--b) 10%, var(--bg)), var(--bg));
    min-height: 100vh; color: #1b1b1b;
    font: 16px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
  .shell { max-width: 900px; margin: 0 auto; padding: 22px 16px 72px; }

  header.top { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
  .mark { width: 44px; height: 44px; border-radius: 12px; flex: none; display: grid; place-items: center;
    color: #fff; font-weight: 800; font-size: 20px; letter-spacing: .02em;
    background: linear-gradient(150deg, color-mix(in srgb, var(--b) 82%, #fff), var(--ink)); box-shadow: var(--shadow); }
  .brandwrap { display: flex; flex-direction: column; }
  .brandwrap b { font-size: 18px; letter-spacing: -.01em; }
  .brandwrap .live { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--muted); }
  .live .d { width: 7px; height: 7px; border-radius: 50%; background: var(--done); box-shadow: 0 0 0 0 var(--done); animation: pl 2.4s infinite; }
  @keyframes pl { 0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--done) 55%,transparent);}70%{box-shadow:0 0 0 7px transparent;}100%{box-shadow:0 0 0 0 transparent;} }

  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 8px; }
  .kpi { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r); padding: 16px 18px; box-shadow: var(--shadow); }
  .kpi.hero { background: linear-gradient(160deg, color-mix(in srgb, var(--b) 12%, #fff), var(--paper)); border-color: color-mix(in srgb, var(--b) 30%, var(--line)); }
  .kpi b { display: block; font-size: 34px; font-weight: 800; letter-spacing: -.03em; line-height: 1; font-variant-numeric: tabular-nums; }
  .kpi.hero b { color: var(--ink); }
  .kpi span { font-size: 12.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
  @media (max-width: 560px) { .kpi b { font-size: 27px; } .kpi { padding: 13px 14px; } }

  .bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 20px 0 12px; flex-wrap: wrap; }
  .filters { display: flex; gap: 7px; flex-wrap: wrap; }
  .filters button { font: inherit; font-weight: 600; font-size: 14px; min-height: 40px; padding: 0 15px; border-radius: 999px;
    border: 1px solid var(--line); background: var(--paper); color: var(--muted); cursor: pointer; }
  .filters button[aria-pressed="true"] { background: var(--ink); color: #fff; border-color: var(--ink); }
  #status { color: var(--muted); font-size: 13.5px; }

  .lead { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r); padding: 16px 18px; margin-bottom: 12px;
    display: grid; gap: 12px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .lead::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: transparent; }
  .lead.is-new::before { background: var(--new); }
  .lead.is-booked::before { background: var(--booked); }
  .lead.is-done { opacity: .62; }
  .lead__top { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .lead__name { font-weight: 700; font-size: 17px; }
  .lead__ts { color: var(--soft); font-size: 12.5px; margin-left: auto; }
  .badge { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; padding: 3px 10px; border-radius: 999px;
    border: 1px solid var(--line); color: var(--muted); background: var(--bg); }
  .badge.b-new { background: var(--new); border-color: var(--new); color: #fff; }
  .badge.b-booked { background: color-mix(in srgb, var(--booked) 14%, #fff); border-color: color-mix(in srgb, var(--booked) 40%, #fff); color: var(--booked); }
  .badge.b-done { background: color-mix(in srgb, var(--done) 14%, #fff); border-color: color-mix(in srgb, var(--done) 40%, #fff); color: var(--done); }
  .lead__msg { color: #34372f; margin: 0; font-size: 15px; }
  .lead__contact { display: flex; gap: 10px; flex-wrap: wrap; }
  .lead__contact a { display: inline-flex; align-items: center; gap: 7px; min-height: 40px; padding: 0 13px; border-radius: 10px;
    border: 1px solid var(--line); color: var(--ink); font-weight: 600; font-size: 14px; text-decoration: none; background: var(--bg); }
  .lead__contact svg { width: 15px; height: 15px; }
  .lead__actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .lead__actions button { font: inherit; font-weight: 700; min-height: 44px; padding: 0 16px; border-radius: 11px;
    border: 1px solid var(--line); background: var(--paper); color: #26281f; cursor: pointer; transition: transform .05s; }
  .lead__actions button:active { transform: scale(.97); }
  .lead__actions .primary { background: var(--b); border-color: var(--b); color: #fff; }
  .lead__actions .ghost { color: var(--muted); }

  .empty { text-align: center; color: var(--muted); padding: 54px 20px; background: var(--paper); border: 1px dashed var(--line); border-radius: var(--r); }
  .empty .big { font-size: 17px; font-weight: 700; color: #2a2c24; margin-bottom: 4px; }
  .foot { text-align: center; color: var(--soft); font-size: 12px; margin-top: 22px; }
</style>
</head>
<body>
<div class="shell">
  <header class="top">
    <div class="mark" id="mark">B</div>
    <div class="brandwrap">
      <b>Tuan's DK Auto Repair</b>
      <span class="live"><span class="d"></span> <span id="livetext">Live from your Google Sheet</span></span>
    </div>
  </header>

  <section class="kpis">
    <div class="kpi hero"><b id="stat-new">-</b><span>New leads</span></div>
    <div class="kpi"><b id="stat-booked">-</b><span>Booked</span></div>
    <div class="kpi"><b id="stat-total">-</b><span>Total</span></div>
  </section>

  <div class="bar">
    <div class="filters" id="filters" role="group" aria-label="Filter leads">
      <button data-f="all" aria-pressed="true">All</button>
      <button data-f="new" aria-pressed="false">New</button>
      <button data-f="booked" aria-pressed="false">Booked</button>
      <button data-f="done" aria-pressed="false">Done</button>
    </div>
    <p id="status">Loading your leads...</p>
  </div>

  <section id="leads"></section>
  <p class="foot">Your control room - private, yours, no monthly fee. Reads your own Google Sheet.</p>
</div>

<script>
  // Passphrase gate: keeps casual/shoulder-surf eyes out. Not filled in? No gate.
  (function () {
    var PASS = '{{DASHBOARD_PASS}}';
    if (!PASS || PASS.indexOf('{{') === 0) { return; }
    if (sessionStorage.getItem('rf_dash_ok') === '1') { return; }
    var entry = prompt('Enter your dashboard password:');
    if (entry === PASS) { sessionStorage.setItem('rf_dash_ok', '1'); return; }
    document.body.innerHTML = '<p style="font:16px sans-serif;padding:2rem">Locked. Refresh to try again.</p>';
    throw new Error('rf-dashboard-locked');
  })();

  var ENDPOINT = '{{CLIENT_SHEET_ENDPOINT}}';
  // The Brain's read key (DASH_KEY in crm/SETUP.md). The public site only POSTs leads in;
  // reading them out needs this key, so a stranger with the /exec URL sees an empty list.
  var READ_KEY = '{{DASHBOARD_KEY}}';
  var READ_URL = ENDPOINT + (ENDPOINT.indexOf('?') < 0 ? '?' : '&') + 'k=' + encodeURIComponent(READ_KEY);
  var ALL = [], FILTER = 'all';
  var PHONE_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.2a2 2 0 0 1 2.1-.5c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2z"/></svg>';
  var MAIL_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 6l-10 7L2 6"/></svg>';

  function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
  function initials() { var s = String('Tuan's DK Auto Repair').trim(); return (s ? s[0] : 'B').toUpperCase(); }

  function load() {
    fetch(READ_URL).then(function (r) { return r.json(); }).then(function (rows) { ALL = rows || []; render(); })
      .catch(function (e) { document.getElementById('status').textContent = 'Could not reach your sheet: ' + e.message; });
  }
  function render() {
    document.getElementById('mark').textContent = initials();
    var wrap = document.getElementById('leads'); wrap.innerHTML = '';
    var news = 0, booked = 0;
    ALL.forEach(function (r) { var st = (r.status || 'new').toLowerCase(); if (st === 'new') news++; if (st === 'booked') booked++; });
    document.getElementById('stat-new').textContent = news;
    document.getElementById('stat-booked').textContent = booked;
    document.getElementById('stat-total').textContent = ALL.length;

    var shown = ALL.slice().reverse().filter(function (r) {
      if (FILTER === 'all') return true; return (r.status || 'new').toLowerCase() === FILTER;
    });
    if (!ALL.length) {
      wrap.innerHTML = '<div class="empty"><div class="big">No leads yet</div>They appear here the moment someone uses your website form. This is where every job will start.</div>';
    } else if (!shown.length) {
      wrap.innerHTML = '<div class="empty"><div class="big">Nothing here</div>No leads with that status right now.</div>';
    } else {
      shown.forEach(function (r) {
        var st = (r.status || 'new').toLowerCase();
        var el = document.createElement('article');
        el.className = 'lead is-' + (st === 'booked' ? 'booked' : st === 'done' ? 'done' : 'new');
        var phone = esc(r.phone), email = esc(r.email);
        el.innerHTML =
          '<div class="lead__top"><span class="lead__name">' + esc(r.name) + '</span>' +
          '<span class="badge b-' + st + '">' + esc(st) + '</span>' +
          '<span class="lead__ts">' + esc(r.ts) + '</span></div>' +
          '<p class="lead__msg">' + esc(r.message) + '</p>' +
          '<div class="lead__contact">' +
            (phone ? '<a href="tel:' + phone + '">' + PHONE_SVG + phone + '</a>' : '') +
            (email ? '<a href="mailto:' + email + '">' + MAIL_SVG + email + '</a>' : '') + '</div>' +
          '<div class="lead__actions">' +
            '<button class="primary" data-s="booked">Mark booked</button>' +
            '<button data-s="done">Mark done</button>' +
            '<button class="ghost" data-s="new">Back to new</button></div>';
        el.querySelectorAll('button').forEach(function (b) {
          b.addEventListener('click', function () { setStatus(r.row, b.getAttribute('data-s')); });
        });
        wrap.appendChild(el);
      });
    }
    document.getElementById('status').textContent = 'Live - tap a lead to update it.';
  }
  function setStatus(row, value) {
    document.getElementById('status').textContent = 'Saving...';
    fetch(ENDPOINT, { method: 'POST', body: JSON.stringify({ action: 'status', row: row, value: value }) })
      .then(load).catch(function (e) { document.getElementById('status').textContent = 'Save failed: ' + e.message; });
  }
  document.getElementById('filters').addEventListener('click', function (e) {
    var btn = e.target.closest('button'); if (!btn) return;
    FILTER = btn.getAttribute('data-f');
    this.querySelectorAll('button').forEach(function (b) { b.setAttribute('aria-pressed', b === btn ? 'true' : 'false'); });
    render();
  });
  load();
</script>
</body>
</html>
